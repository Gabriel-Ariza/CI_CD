<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <title>Calculadora - CI/CD</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <h1>Calculadora</h1>

        <label for="num1">Número 1:</label>
        <input type="number" id="num1" placeholder="Ingresa un número" />

        <label for="num2">Número 2:</label>
        <input type="number" id="num2" placeholder="Ingresa un número" />

        <button onclick="calcular()">Sumar</button>
        <button onclick="limpiar()">Limpiar</button>

        <div id="resultado">
            <p id="operacion"></p>
            <div class="valor" id="valor"></div>
        </div>

        <script src="main.js"></script>
        <script>
            function calcular() {
                const num1 = Number.parseFloat(
                    document.getElementById('num1').value,
                );
                const num2 = Number.parseFloat(
                    document.getElementById('num2').value,
                );

                if (Number.isNaN(num1) || Number.isNaN(num2)) {
                    alert('Ingresa números válidos');
                    return;
                }

                const resultado = sumar(num1, num2);
                document.getElementById('operacion').textContent =
                    num1 + ' + ' + num2 + ' =';
                document.getElementById('valor').textContent = resultado;
                document.getElementById('resultado').classList.add('mostrar');
            }

            function limpiar() {
                document.getElementById('num1').value = '';
                document.getElementById('num2').value = '';
                document
                    .getElementById('resultado')
                    .classList.remove('mostrar');
            }
        </script>
    </body>
</html>
