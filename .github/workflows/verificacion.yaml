name: Pipeline Profesional de Calidad
on: [push]

permissions:
  contents: write 

jobs:
  calidad-y-analisis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # SonarQube necesita el historial completo para analizar mejor

      - name: Instalar dependencias
        run: npm install

      - name: Verificar formato con Prettier
        run: npm run format:check

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=CI_CD
            -Dsonar.organization=gabriel-ariza
            -Dsonar.qualitygate.wait=true 
            -Dsonar.sources=.

  despliegue:
    needs: calidad-y-analisis 
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' # Solo despliega si es la rama principal
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./